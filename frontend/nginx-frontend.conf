server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy FIL price request to CoinGecko (bypass CORS)
    location /api/fil-price {
        proxy_pass https://api.coingecko.com/api/v3/simple/price?ids=filecoin&vs_currencies=usd;
        proxy_set_header Host api.coingecko.com;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}